<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>My Hand-Drawn AR</title>
    <script src="https://cdn.jsdelivr.net/gh/aframevr/aframe@1.2.0/dist/aframe-master.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.3.3/aframe/build/aframe-ar-nft.js"></script>  
</head>
  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-assets>
        <a-asset-item id="himawari-model" src="assets/himawari/himawari.glb"></a-asset-item>
      </a-assets>

      <a-nft
        type="nft"
        url="https://attaytobac.github.io/image-2-AR/assets/himawari/marker-data/himawari"
        smooth="true"
        smoothCount="10"
        smoothTolerance=".01"
        smoothThreshold="5">
        
        <a-entity
          gltf-model="#himawari-model"
          scale="5 5 5"
          position="0 0 0">
        </a-entity>
        
      </a-nft>
      
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
