<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>My Hand-Drawn AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-nft
        type="nft"
        url="/assets/himawari/marker-data/himawari"
        smooth="true"
        smoothCount="10"
        smoothTolerance=".01"
        smoothThreshold="5">
        
        <a-entity
          gltf-model="/assets/himawari/himawari.glb"
          scale="5 5 5"
          position="0 0 0">
        </a-entity>
        
      </a-nft>
      
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
